name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile app.py
          python -m py_compile gaia_pages.py
          python -m py_compile utils.py
          python -m py_compile commentary.py
          python -m py_compile landing.py
          echo "All files pass syntax check."

      - name: Lint (ruff)
        run: |
          ruff check . \
            --select E9,F821,F841 \
            --exclude ".venv,__pycache__,data,misc"
